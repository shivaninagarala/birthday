<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Secret ❤️</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
}

/* Login box */
#loginBox {
    margin-top: 100px;
}

input {
    padding: 10px;
    font-size: 16px;
    border-radius: 10px;
    border: 1px solid gray;
}

button {
    padding: 10px 15px;
    border: none;
    background: red;
    color: white;
    border-radius: 10px;
}

/* Hidden main content */
#mainContent {
    display: none;
}

/* Existing styles */
.container {
    background: white;
    width: 90%;
    margin: 30px auto;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 0 15px gray;
}

#timer {
    font-size: 26px;
    color: #ff3366;
    font-weight: bold;
}

.slideshow {
    position: relative;
    width: 260px;
    height: 260px;
    margin: auto;
}

.slideshow img {
    width: 100%;
    height: 100%;
    border-radius: 15px;
    position: absolute;
    opacity: 0;
    transition: opacity 1s;
}

.slideshow img.active {
    opacity: 1;
}

/* Hearts */
.heart {
    position: fixed;
    bottom: -10px;
    color: red;
    font-size: 20px;
    animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-800px); opacity: 0; }
}
</style>
</head>

<body>

<!-- 🔐 Password Screen -->
<div id="loginBox">
    <h2>Enter Secret Password ❤️</h2>
    <input type="password" id="pass">
    <button onclick="checkPassword()">Open</button>
    <p id="error" style="color:red;"></p>
</div>

<!-- 💖 Main Website -->
<div id="mainContent">

<div class="container">

<h1>🎉 Happy Birthday My Love 🎉</h1>

<p>
Dear ❤️,<br><br>
You are my happiness and my world 💖<br>
I’m lucky to have you 💕<br><br>
Happy Birthday 🎂
</p>

<h2>⏳ Countdown</h2>
<div id="timer"></div>

<h2>📸 Our Memories</h2>

<div class="slideshow">
    <img src="photo1.jpg" class="active">
    <img src="photo2.jpg">
    <img src="photo3.jpg">
</div>

<h2>💖 Love You Forever 💖</h2>

</div>

</div>

<script>
// 🔐 Password
let correctPassword = "shivani@1555"; // 👉 CHANGE THIS

function checkPassword() {
    let userInput = document.getElementById("pass").value;

    if (userInput === correctPassword) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("mainContent").style.display = "block";
    } else {
        document.getElementById("error").innerText = "Wrong Password ❌";
    }
}

// 🎞️ Slideshow
let slides = document.querySelectorAll(".slideshow img");
let index = 0;

setInterval(() => {
    slides[index].classList.remove("active");
    index = (index + 1) % slides.length;
    slides[index].classList.add("active");
}, 3000);

// ⏳ Countdown
let birthday = new Date("2026-04-25 00:00:00").getTime();

setInterval(() => {
    let now = new Date().getTime();
    let diff = birthday - now;

    let d = Math.floor(diff / (1000*60*60*24));
    let h = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
    let m = Math.floor((diff % (1000*60*60)) / (1000*60));
    let s = Math.floor((diff % (1000*60)) / 1000);

    document.getElementById("timer").innerHTML =
        d+"d "+h+"h "+m+"m "+s+"s";

    if (diff < 0) {
        document.getElementById("timer").innerHTML =
        "🎂 Happy Birthday My Love 🎂";
    }
}, 1000);

// 💓 Hearts
setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
}, 500);
</script>

</body>
</html>
